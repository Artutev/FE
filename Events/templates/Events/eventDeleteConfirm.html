{% extends 'Users/base.html' %}

{% block title %}Удаление мероприятия | EventHub{% endblock %}

{% block content %}
<section class="page-section delete-section">
    <div class="container form-layout">
        <div class="content-card delete-card">
            <span class="section-badge">Подтверждение</span>
            <h1>Удалить мероприятие?</h1>
            <p class="section-lead">Вы собираетесь удалить событие «{{ event.name }}». Это действие нельзя отменить.</p>

            <form method="POST" class="delete-form">
                {% csrf_token %}
                <div class="card-actions delete-actions">
                    <button type="submit" class="btn btn-danger">Удалить</button>
                    <a href="{% url 'Users:profile' %}" class="btn btn-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
